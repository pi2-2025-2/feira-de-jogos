<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard - Feira de jogos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f7f7f7;
    }

    h1 {
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }

    th {
      background: #eee;
      text-transform: uppercase;
      font-size: 14px;
    }

    .alive {
      color: green;
      font-weight: bold;
    }

    .dead {
      color: red;
      font-weight: bold;
    }

    #updatedAt {
      font-size: 13px;
      color: #555;
    }

    /* Responsividade Celular */
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      table, thead, tbody, th, td, tr {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        background: white;
        margin-bottom: 15px;
        border: 1px solid #ddd;
        padding: 10px;
        border-radius: 8px;
      }

      td {
        border: none;
        padding: 5px 0;
      }

      td:before {
        content: attr(data-label);
        font-weight: bold;
        display: block;
        margin-bottom: 3px;
        color: #333;
        text-transform: uppercase;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <h1>Status das Máquinas</h1>
  <div id="updatedAt"></div>

  <table>
    <thead>
      <tr>
        <th>Máquina</th>
        <th>ID</th>
        <th>Último Ping</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="machines"></tbody>
  </table>

  <script>
    async function loadStatus() {
      try {
        const res = await fetch("/health");
        const data = await res.json();

        const tbody = document.getElementById("machines");
        tbody.innerHTML = "";

        data.forEach(item => {
          const tr = document.createElement("tr");
          const last = new Date(item.lastPing).toLocaleTimeString();

          tr.innerHTML = `
            <td data-label="Máquina">${item.machine || "-"}</td>
            <td data-label="ID">${item.id}</td>
            <td data-label="Último Ping">${last}</td>
            <td data-label="Status" class="${item.alive ? 'alive' : 'dead'}">${item.alive ? 'Online' : 'Offline'}</td>
          `;

          tbody.appendChild(tr);
        });

        document.getElementById("updatedAt").innerText =
          "Atualizado: " + new Date().toLocaleTimeString();

      } catch (err) {
        console.error("Erro ao carregar /health:", err);
      }
    }

    loadStatus();
    setInterval(loadStatus, 2000);
  </script>
</body>
</html>
